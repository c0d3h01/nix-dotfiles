# Build NixOS installer ISO and publish a GitHub Release.
# Triggered manually or on version tags (v*).
name: Release ISO

on:
  workflow_dispatch:
    inputs:
      host:
        description: "Host to build ISO for"
        required: true
        default: "laptop"
        type: string
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  build:
    name: Build ISO — ${{ inputs.host || 'laptop' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            accept-flake-config = true

      - name: Set build variables
        id: vars
        run: |
          HOST="${{ inputs.host || 'laptop' }}"
          TAG="${GITHUB_REF_NAME}"

          # For manual dispatch without a tag, generate a date-based version
          if [[ "$TAG" != v* ]]; then
            TAG="v$(date -u +%Y.%m.%d)-${GITHUB_SHA::7}"
          fi

          {
            echo "host=${HOST}"
            echo "tag=${TAG}"
            echo "date=$(date -u +%Y-%m-%d)"
            echo "sha=${GITHUB_SHA::7}"
          } >> "$GITHUB_OUTPUT"

      - name: Build ISO
        run: |
          nix build ".#iso-${{ steps.vars.outputs.host }}" \
            --print-build-logs \
            --no-link \
            --out-link result

      - name: Prepare release assets
        id: assets
        run: |
          ISO_PATH="$(readlink -f result/iso/*.iso)"
          ISO_NAME="nixos-${{ steps.vars.outputs.host }}-${{ steps.vars.outputs.tag }}.iso"

          # Copy with release-friendly name
          cp "$ISO_PATH" "$ISO_NAME"

          # Generate checksum
          sha256sum "$ISO_NAME" > "${ISO_NAME}.sha256"

          # Capture size for release notes
          SIZE="$(du -h "$ISO_NAME" | cut -f1)"

          {
            echo "iso=${ISO_NAME}"
            echo "checksum=${ISO_NAME}.sha256"
            echo "size=${SIZE}"
          } >> "$GITHUB_OUTPUT"

      - name: Collect system info
        id: info
        run: |
          NIXPKGS="$(nix flake metadata --json 2>/dev/null | jq -r '.locks.nodes.nixpkgs.locked.rev // "unknown"' | head -c 7)"
          KERNEL="$(nix eval --raw ".#nixosConfigurations.${{ steps.vars.outputs.host }}.config.boot.kernelPackages.kernel.version" 2>/dev/null || echo "zen")"
          {
            echo "nixpkgs=${NIXPKGS}"
            echo "kernel=${KERNEL}"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: "NixOS ${{ steps.vars.outputs.host }} — ${{ steps.vars.outputs.tag }}"
          draft: false
          prerelease: false
          generate_release_notes: false
          make_latest: true
          files: |
            ${{ steps.assets.outputs.iso }}
            ${{ steps.assets.outputs.checksum }}
          body: |
            ## NixOS Installer ISO — `${{ steps.vars.outputs.host }}`

            Ready-to-flash NixOS installer image with a fully declarative system configuration.

            ### 📋 Build Details

            | | |
            |---|---|
            | **Host** | `${{ steps.vars.outputs.host }}` |
            | **Date** | ${{ steps.vars.outputs.date }} |
            | **Commit** | [`${{ steps.vars.outputs.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) |
            | **Nixpkgs** | `${{ steps.info.outputs.nixpkgs }}` (unstable) |
            | **Kernel** | `${{ steps.info.outputs.kernel }}` (Zen) |
            | **ISO Size** | ${{ steps.assets.outputs.size }} |

            ### ⚡ What's Included

            - **Desktop** — GNOME on Wayland
            - **Bootloader** — systemd-boot (EFI)
            - **Filesystem** — Disko-managed NVMe (Btrfs)
            - **Hardening** — Firewall, SSH key-only, sysctl hardening, DNS-over-TLS
            - **Performance** — Zen kernel, zram, BBR, BFQ/mq-deadline I/O
            - **Dev tools** — Neovim, Git, Docker, direnv, Zsh

            ### 🚀 Install

            ```bash
            # Write to USB (replace /dev/sdX)
            sudo dd if=${{ steps.assets.outputs.iso }} of=/dev/sdX bs=4M status=progress oflag=sync
            ```

            ### ✅ Verify

            ```bash
            sha256sum -c ${{ steps.assets.outputs.checksum }}
            ```